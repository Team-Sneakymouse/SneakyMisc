name: SneakyMisc
version: "1.0"
main: com.danidipp.sneakymisc.SneakyMisc
bootstrapper: com.danidipp.sneakymisc.SneakyMiscBootstrap
api-version: "1.21"
authors:
  - DaniDipp
description: "Paper plugin for Lords of Minecraft mechanics that don't justify having a plugin of their own"
dependencies:
  server:
    SneakyPocketbase:
      load: BEFORE
      required: true
    SneakyCharacterManager:
      load: BEFORE
      required: false
    PlaceholderAPI:
      load: BEFORE
      required: false
    MagicSpells:
      load: BEFORE
      required: false
    SneakyMail:
      load: BEFORE
      required: true
    SneakyCellPhones:
      load: BEFORE
      required: false
    WorldGuard:
      load: BEFORE
      required: false
    CoreProtect:
      load: BEFORE
      required: false
